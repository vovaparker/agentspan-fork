name: Jira Sync
on:
  pull_request:
    types: [opened, closed]
  issue_comment:
    types: [created]
  release:
    types: [published]
permissions:
  contents: write
  pull-requests: write
jobs:
  jira:
    uses: agentspan-ai/github-workflows/.github/workflows/jira-sync.yml@main
    with:
      runs_on: ubuntu-latest
      public_repo: true
    secrets: inherit
