# Test profile — isolated SQLite DB per test run
spring.application.name=conductor
server.port=0

conductor.db.type=sqlite
spring.datasource.url=jdbc:sqlite:agentspan_test.db?busy_timeout=15000&journal_mode=WAL

conductor.indexing.enabled=true
conductor.elasticsearch.version=0
conductor.queue.type=sqlite
conductor.indexing.type=sqlite
conductor.app.sweeperThreadCount=1

conductor.workflow-execution-lock.type=local_only

conductor.task-status-listener.type=agent
conductor.workflow-status-listener.type=agent

conductor.app.workflow.name-validation.enabled=false
conductor.app.ownerEmailMandatory=false

# Disable all AI providers for tests
conductor.integrations.ai.enabled=false

# Disable auth for tests prevents AuthFilter from blocking requests without credentials
agentspan.auth.enabled=false

# Keep skill registry artifacts isolated from local development data.
agentspan.skills.storage.directory=${java.io.tmpdir}/agentspan-test/skills

# Provide a test master key to avoid AGENTSPAN_MASTER_KEY requirement
# (32 zero bytes base64-encoded for test use only, NOT a production key)
AGENTSPAN_MASTER_KEY=MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=

# Disable all metrics exports
management.atlas.metrics.export.enabled=false
management.otlp.metrics.export.enabled=false
management.influx.metrics.export.enabled=false
management.elastic.metrics.export.enabled=false
management.dynatrace.metrics.export.enabled=false
management.new-relic.metrics.export.enabled=false
management.stackdriver.metrics.export.enabled=false
management.datadog.metrics.export.enabled=false
management.statsd.metrics.export.enabled=false
management.cloudwatch.metrics.export.enabled=false
management.azuremonitor.metrics.export.enabled=false
management.jmx.metrics.export.enabled=false
