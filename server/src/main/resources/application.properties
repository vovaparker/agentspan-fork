spring.application.name=conductor
spring.main.allow-bean-definition-overriding=true
server.port=6767

# Graceful shutdown — stop accepting new connections, let in-flight requests finish
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# Scheduled task executor — await termination on shutdown
spring.task.scheduling.shutdown.await-termination=true
spring.task.scheduling.shutdown.await-termination-period=5s

# --- Backend: sqlite (default) or postgres ---
# Set via spring profile: ./gradlew bootRun --args='--spring.profiles.active=postgres'
conductor.db.type=sqlite
spring.datasource.url=jdbc:sqlite:agent-runtime.db?busy_timeout=15000&journal_mode=WAL

# Indexing
conductor.indexing.enabled=true
conductor.elasticsearch.version=0
conductor.queue.type=sqlite
conductor.indexing.type=sqlite
conductor.app.sweeperThreadCount=1
#conductor.app.sweeper.enabled

# Locking
conductor.workflow-execution-lock.type=local_only

# Workflow Message Queue (WMQ) feature
conductor.workflow-message-queue.enabled=true
conductor.workflow-message-queue.maxQueueSize=1000
conductor.workflow-message-queue.ttlSeconds=86400
conductor.workflow-message-queue.maxBatchSize=100

# Listeners — use 'agent' type to activate AgentEventListener (@Primary overrides stubs)
conductor.task-status-listener.type=agent
conductor.workflow-status-listener.type=agent

# Relaxed validation
conductor.app.workflow.name-validation.enabled=false
conductor.app.ownerEmailMandatory=false

# Swagger
springdoc.api-docs.path=/api-docs

# Optional Metrics Plugins configuration
# See https://docs.micrometer.io/micrometer/reference/implementations.html for configuration properties
management.atlas.metrics.export.enabled=false
management.otlp.metrics.export.enabled=false
management.influx.metrics.export.enabled=false
management.elastic.metrics.export.enabled=false
management.dynatrace.metrics.export.enabled=false
management.new-relic.metrics.export.enabled=false

management.stackdriver.metrics.export.enabled=false
management.stackdriver.metrics.export.projectId=YOUR_PROJECT_ID

management.datadog.metrics.export.enabled=false
management.datadog.metrics.export.apiKey=YOUR_API_KEY

management.statsd.metrics.export.enabled=false
management.cloudwatch.metrics.export.enabled=false
management.cloudwatch.metrics.export.namespace=conductor

management.azuremonitor.metrics.export.enabled=false
management.azuremonitor.metrics.export.instrumentationKey=INSTRUMENTATION_KEY
management.jmx.metrics.export.enabled=false

# =============================================================================
# AI Provider Configuration - Environment Variable Defaults
# =============================================================================
# Providers are automatically enabled when their API key is set.
# Set the standard environment variables below to configure each provider.
# These can be overridden by explicit property values in this file or via
# external configuration (e.g. conductor.properties).
# =============================================================================
# Start AI Workers
conductor.integrations.ai.enabled=true

# OpenAI (GPT-4o, DALL-E 3, Sora, text-embedding-3-small/large)
conductor.ai.openai.api-key=${OPENAI_API_KEY:}
conductor.ai.openai.organization-id=${OPENAI_ORG_ID:}

# Anthropic (Claude 3.5/4 Sonnet, Claude 3 Opus/Haiku)
conductor.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}

# Mistral AI (Mistral Small/Medium/Large, Mixtral)
conductor.ai.mistral.api-key=${MISTRAL_API_KEY:}

# Cohere (Command, Command-R, embed-english-v3.0)
conductor.ai.cohere.api-key=${COHERE_API_KEY:}

# Grok / xAI (Grok-3, Grok-3-mini)
conductor.ai.grok.api-key=${XAI_API_KEY:}

# Perplexity AI (Sonar, Sonar Pro)
conductor.ai.perplexity.api-key=${PERPLEXITY_API_KEY:}

# HuggingFace (Llama, Mistral, Zephyr)
conductor.ai.huggingface.api-key=${HUGGINGFACE_API_KEY:}

# Stability AI (SD3.5, Stable Image Core, Stable Image Ultra)
conductor.ai.stabilityai.api-key=${STABILITY_API_KEY:}

# Azure OpenAI
conductor.ai.azureopenai.api-key=${AZURE_OPENAI_API_KEY:}
conductor.ai.azureopenai.base-url=${AZURE_OPENAI_ENDPOINT:}
conductor.ai.azureopenai.deployment-name=${AZURE_OPENAI_DEPLOYMENT:}

# AWS Bedrock (Claude, Titan, Llama via AWS)
conductor.ai.bedrock.access-key=${AWS_ACCESS_KEY_ID:}
conductor.ai.bedrock.secret-key=${AWS_SECRET_ACCESS_KEY:}
conductor.ai.bedrock.region=${AWS_REGION:us-east-1}

# Google Vertex AI (Gemini, Veo) - also uses GOOGLE_APPLICATION_CREDENTIALS for auth
conductor.ai.gemini.project-id=${GOOGLE_CLOUD_PROJECT:}
conductor.ai.gemini.location=${GOOGLE_CLOUD_LOCATION:us-central1}
conductor.ai.gemini.api-key=${GEMINI_API_KEY:}

# Ollama (local inference server)
conductor.ai.ollama.base-url=${OLLAMA_HOST:http://localhost:11434}


#
# Override context window for a specific model (tokens):
# agentspan.model-context-windows.my-custom-model=256000
agentspan.model-context-windows.gpt-5.4=15000
# Set a default context window for unknown models:
agentspan.default-context-window=128000
# Number of recent exchanges to preserve verbatim during context condensation (default: 5):
agentspan.context-condensation.recent-exchanges=5

# Pipeline context passing size limits:
agentspan.context.max-size-bytes=32768
agentspan.context.max-value-size-bytes=4096

# Server-side skill package registry. Use filesystem for local/single-node
# deployments, or conductor-payload to store immutable package blobs through
# Conductor's external payload storage backend.
agentspan.skills.package-store.type=${AGENTSPAN_SKILLS_PACKAGE_STORE_TYPE:filesystem}
agentspan.skills.storage.directory=${AGENTSPAN_SKILLS_STORAGE_DIR:${java.io.tmpdir}/agentspan/skills}
agentspan.skills.package-store.filesystem.directory=${AGENTSPAN_SKILLS_PACKAGE_STORE_DIR:${agentspan.skills.storage.directory}/packages}
agentspan.skills.max-package-bytes=${AGENTSPAN_SKILLS_MAX_PACKAGE_BYTES:52428800}
agentspan.skills.max-preview-bytes=${AGENTSPAN_SKILLS_MAX_PREVIEW_BYTES:1048576}
agentspan.skills.max-uncompressed-bytes=${AGENTSPAN_SKILLS_MAX_UNCOMPRESSED_BYTES:209715200}
agentspan.skills.max-file-count=${AGENTSPAN_SKILLS_MAX_FILE_COUNT:2000}

# =============================================================================
# Auth Configuration
# =============================================================================
agentspan.auth.enabled=false

# Default users (bcrypt passwords — plain text here are hashed at startup)
agentspan.auth.users[0].username=agentspan
agentspan.auth.users[0].password=agentspan

# =============================================================================
# Credential Store Configuration
# =============================================================================
agentspan.credentials.store=built-in
agentspan.credentials.strict-mode=false
agentspan.credentials.resolve.rate-limit=120

# AGENTSPAN_MASTER_KEY: base64-encoded 256-bit key for AES-256-GCM.
# Unset + localhost → auto-generated and warned.
# Unset + non-localhost → server refuses to start.
# agentspan.credentials.master-key=${AGENTSPAN_MASTER_KEY:}

# Credential schema init — handled by CredentialDataSourceConfig via DataSourceInitializer bean
# (We do NOT use spring.sql.init here to avoid conflicts with Conductor's DataSource setup)
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:schema-credentials.sql

# Metrics
conductor.metrics-prometheus.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.web.server.request.autotime.percentiles=0.50,0.75,0.90,0.95,0.99
management.endpoint.health.show-details=always
management.observations.annotations.enabled=false
management.metrics.enable.tasks.scheduled=false

# Disable Conductor workflow monitor (sweeper, repair)
conductor.workflow-monitor.enabled=false
